
<!DOCTYPE html><html lang="pt-br"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Controle Financeiro</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI;background:linear-gradient(135deg,#0f172a,#1e3a8a);color:#fff}
.wrap{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
aside{background:#111827;padding:24px}aside h2{margin:0 0 25px}aside a{display:block;color:#cbd5e1;text-decoration:none;padding:10px;border-radius:8px}aside a:hover{background:#1f2937}
main{padding:30px}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.card{background:#fff;color:#111;border-radius:16px;padding:20px;box-shadow:0 8px 20px rgba(0,0,0,.2)}
.form,.table{margin-top:24px;background:#fff;color:#111;padding:20px;border-radius:16px}
input,select,button{padding:12px;border-radius:10px;border:1px solid #ccc;margin:6px}
button{background:#2563eb;color:#fff;border:none;cursor:pointer}button:hover{background:#1d4ed8}
table{width:100%;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid #eee}
@media(max-width:800px){.wrap{grid-template-columns:1fr}aside{display:none}.cards{grid-template-columns:1fr}}
</style></head><body>
<div class="wrap">
<aside><h2>💰 Finance</h2><a href="#">Dashboard</a><a href="#">Lançamentos</a><a href="#">Relatórios</a></aside>
<main>
<h1>Dashboard Financeiro</h1>
<div class="cards">
<div class="card"><h3>Receitas</h3><h2 id=r>R$ 0,00</h2></div>
<div class="card"><h3>Despesas</h3><h2 id=d>R$ 0,00</h2></div>
<div class="card"><h3>Saldo</h3><h2 id=s>R$ 0,00</h2></div>
</div>
<div class=form>
<input id=desc placeholder="Descrição"><input id=valor type=number step=0.01 placeholder="Valor">
<select id=tipo><option>Receita</option><option>Despesa</option></select>
<button onclick="add()">Adicionar</button>
</div>
<div class=table><table><thead><tr><th>Descrição</th><th>Tipo</th><th>Valor</th><th>Ação</th></tr></thead><tbody id=tb></tbody></table></div>
</main></div>
<script>
let dados=JSON.parse(localStorage.movs||"[]");
function save(){localStorage.movs=JSON.stringify(dados);render()}
function add(){let de=desc.value,v=parseFloat(valor.value);if(!de||isNaN(v))return alert("Preencha os campos.");dados.push({de,t:tipo.value,v});desc.value="";valor.value="";save()}
function del(i){dados.splice(i,1);save()}
function render(){let rec=0,des=0;tb.innerHTML="";dados.forEach((m,i)=>{m.t=="Receita"?rec+=m.v:des+=m.v;tb.innerHTML+=`<tr><td>${m.de}</td><td>${m.t}</td><td>R$ ${m.v.toFixed(2)}</td><td><button onclick="del(${i})">Excluir</button></td></tr>`});r.textContent=`R$ ${rec.toFixed(2)}`;d.textContent=`R$ ${des.toFixed(2)}`;s.textContent=`R$ ${(rec-des).toFixed(2)}`}
render();
</script></body></html>
