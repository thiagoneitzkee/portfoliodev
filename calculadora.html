<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora | Thiago Dev</title>


<style>

body{

background:#080808;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;

}


.calculadora{

background:#151515;
padding:25px;
border-radius:20px;
box-shadow:0 0 20px #00ffff;

}


#visor{

width:100%;
height:60px;

font-size:30px;

text-align:right;

padding:10px;

background:#000;

color:#00ffff;

border:none;

border-radius:10px;

margin-bottom:20px;

}



.botoes{

display:grid;

grid-template-columns:repeat(4,70px);

gap:15px;

}



button{

height:60px;

font-size:22px;

border:none;

border-radius:15px;

cursor:pointer;

background:#333;

color:white;

}



button:hover{

background:#00ffff;

color:#000;

}



.operador{

background:#00ffff;

color:#000;

}



.limpar{

background:#ff3333;

}



</style>


</head>


<body>



<div class="calculadora">


<input id="visor" disabled>


<div class="botoes">


<button class="limpar" onclick="limpar()">C</button>

<button onclick="apagar()">⌫</button>

<button onclick="adicionar('%')">%</button>

<button class="operador" onclick="adicionar('/')">÷</button>


<button onclick="adicionar('7')">7</button>

<button onclick="adicionar('8')">8</button>

<button onclick="adicionar('9')">9</button>

<button class="operador" onclick="adicionar('*')">×</button>


<button onclick="adicionar('4')">4</button>

<button onclick="adicionar('5')">5</button>

<button onclick="adicionar('6')">6</button>

<button class="operador" onclick="adicionar('-')">−</button>


<button onclick="adicionar('1')">1</button>

<button onclick="adicionar('2')">2</button>

<button onclick="adicionar('3')">3</button>

<button class="operador" onclick="adicionar('+')">+</button>


<button onclick="adicionar('0')">0</button>

<button onclick="adicionar('.')">.</button>

<button onclick="calcular()">=</button>


</div>


</div>



<script>


let visor=document.getElementById("visor");



function adicionar(valor){

visor.value += valor;

}



function limpar(){

visor.value="";

}



function apagar(){

visor.value =
visor.value.slice(0,-1);

}



function calcular(){

try{

visor.value =
eval(visor.value);

}

catch{

visor.value="Erro";

}


}



document.addEventListener("keydown",function(e){

if(
e.key >=0 &&
e.key <=9 ||
["+","-","*","/","."].includes(e.key)
){

adicionar(e.key);

}


if(e.key==="Enter"){

calcular();

}


if(e.key==="Backspace"){

apagar();

}


});



</script>


</body>

</html>
